<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PinoyBoy TCG</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
:root {
  --black:    #060C06;
  --deep:     #081208;
  --navy:     #0E2240;
  --card:     #112038;
  --blue:     #1F5FA8;
  --sky:      #58BDEE;
  --foam:     #BDE4FF;
  --orange:   #F5A523;
  --gold:     #C4781A;
  --white:    #EAF6FF;
  --swamp1:   #006597;
  --swamp2:   #006597;
  --pad-dark: #145214;
  --pad-main: #2E8B2E;
  --pad-hi:   #45B845;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family:'Press Start 2P',monospace;
  background:var(--swamp1);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow-x:hidden;
}

/* ---- CANVAS BG ---- */
#bg {
  position:fixed;inset:0;z-index:0;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}

/* ---- SWAMP LAYER (lily pads + reeds) ---- */
.swamp-layer {
  position:fixed;inset:0;z-index:1;
  pointer-events:none;
  overflow:hidden;
}

/* Lily pad */
.lilypad {
  position:absolute;
  border-radius:50%;
  background:radial-gradient(ellipse at 38% 35%, #4DB84D, #2A7A2A 55%, #145214);
  border:3px solid #0A3010;
  clip-path:polygon(
    50% 50%,
    38% 0%,
    5% 15%,
    0% 50%,
    5% 85%,
    20% 97%,
    50% 100%,
    80% 97%,
    95% 85%,
    100% 50%,
    95% 15%,
    62% 0%
  );
  box-shadow:0 6px 14px rgba(0,0,0,.55);
  animation:pad-drift var(--dur,7s) ease-in-out infinite alternate;
}
@keyframes pad-drift {
  0%  {transform:rotate(var(--rot,0deg)) translateY(0px)   scale(1);}
  50% {transform:rotate(var(--rot,0deg)) translateY(-5px)  scale(1.02);}
  100%{transform:rotate(var(--rot,0deg)) translateY(2px)   scale(0.99);}
}
/* Little flower on some pads */
.lilypad.flower::after {
  content:'';
  position:absolute;
  top:38%; left:38%;
  width:24%; height:24%;
  background:radial-gradient(circle,#FFEEBB,#FF9EC8 70%);
  border-radius:50%;
  box-shadow:0 0 4px rgba(255,200,150,.7);
}

/* Reed / cattail */
.reed {
  position:absolute;
  bottom:0;
  width:4px;
  background:linear-gradient(to top,#3A2206,#6B420E);
  border-radius:3px 3px 0 0;
  transform-origin:bottom center;
  animation:reed-sway var(--sway,5s) ease-in-out infinite alternate;
}
@keyframes reed-sway {
  from{transform:rotate(-4deg);}
  to  {transform:rotate(4deg);}
}
.reed::before {      /* cattail head */
  content:'';
  position:absolute;
  top:-26px; left:-5px;
  width:14px; height:28px;
  background:linear-gradient(to bottom,#7A5010,#5A3508);
  border-radius:40% 40% 30% 30%;
}
.reed::after {       /* thin top spike */
  content:'';
  position:absolute;
  top:-46px; left:0px;
  width:4px; height:22px;
  background:#5A3A08;
  border-radius:2px;
}

/* ---- SCANLINES ---- */
.scanlines {
  position:fixed;inset:0;z-index:4;
  pointer-events:none;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 2px,
    rgba(0,0,0,.055) 2px,rgba(0,0,0,.055) 4px
  );
}

/* ---- PAGE ---- */
.page {
  position:relative;z-index:5;
  width:100%;max-width:450px;
  padding:24px 16px 52px;
  display:flex;flex-direction:column;align-items:center;
}

/* ---- GEN 3 DIALOG CARD ---- */
.card {
  width:100%;
  background:var(--card);
  position:relative;
  padding:30px 26px 28px;
  border:4px solid var(--black);
  box-shadow:
    inset 0 0 0 3px var(--sky),
    inset 0 0 0 6px rgba(0,0,0,.55),
    8px 8px 0 0 var(--black);
}

/* Corner diamonds */
.px-corner {
  position:absolute;
  font-size:16px; color:var(--orange);
  line-height:1;
  text-shadow:2px 2px 0 var(--black);
  animation:corner-glow 2.2s steps(2) infinite;
}
@keyframes corner-glow{
  0%,100%{color:var(--orange);}
  50%    {color:var(--sky);}
}
.px-tl{top:8px; left:10px;}
.px-tr{top:8px; right:10px;}
.px-bl{bottom:8px; left:10px;}
.px-br{bottom:8px; right:10px;}

/* ---- LOGO ---- */
.logo-wrap {
  display:flex;justify-content:center;
  margin-bottom:12px;
}
.logo-wrap img {
  width:92%;max-width:310px;height:auto;
  filter:drop-shadow(0 0 8px rgba(88,189,238,.45));
}

/* ---- TAGLINE ---- */
.tagline {
  font-size:7px;           /* ← increased */
  color:var(--sky);
  text-align:center;
  line-height:2.4;
  margin-bottom:14px;
  text-shadow:2px 2px 0 var(--black);
  letter-spacing:.04em;
}

/* ---- PIXEL DIVIDERS ---- */
.px-divider {
  display:flex;align-items:center;
  width:100%;margin:10px 0;
}
.px-div-line {
  flex:1;height:4px;
  background:repeating-linear-gradient(
    90deg,
    var(--sky) 0,var(--sky) 6px,
    transparent 6px,transparent 10px,
    var(--blue) 10px,var(--blue) 16px,
    transparent 16px,transparent 20px
  );
  opacity:.7;
}
.px-div-mid {
  font-size:12px;padding:0 10px;
  animation:blink-mid 1.5s steps(1) infinite;
}
@keyframes blink-mid{50%{opacity:0}}

/* ---- MUDKIP — CENTRED ---- */
.mascot-wrap {
  display:flex;justify-content:center;
  margin:6px 0 10px;
  filter:
    drop-shadow(0 0 12px var(--sky))
    drop-shadow(4px 4px 0 rgba(0,0,0,.6));
  animation:px-float .7s steps(4) infinite alternate;
}
@keyframes px-float{
  from{transform:translateY(0);}
  to  {transform:translateY(-8px);}
}
.mascot-wrap img{width:155px;height:auto;}

/* ---- LINKS ---- */
.links{display:flex;flex-direction:column;gap:14px;width:100%;}

.link-btn {
  display:flex;align-items:center;gap:14px;
  width:100%;padding:16px 18px;
  background:var(--navy);
  border:3px solid var(--black);
  box-shadow:
    inset 0 0 0 2px var(--blue),
    5px 5px 0 0 var(--black);
  text-decoration:none;color:var(--white);
  cursor:pointer;
  transition:transform 0s,box-shadow 0s;
}
.link-btn:hover {
  transform:translate(-3px,-3px);
  box-shadow:inset 0 0 0 2px var(--sky),8px 8px 0 0 var(--black);
}
.link-btn:active {
  transform:translate(5px,5px);
  box-shadow:inset 0 0 0 2px var(--blue),0 0 0 0 var(--black);
}
.link-btn.shop {
  box-shadow:inset 0 0 0 2px var(--gold),5px 5px 0 0 var(--black);
}
.link-btn.shop:hover {
  box-shadow:inset 0 0 0 2px var(--orange),8px 8px 0 0 var(--black);
}

.btn-icon{font-size:28px;flex-shrink:0;}
.btn-text{flex:1;}
.btn-label {
  font-size:11px;         /* ← increased */
  color:var(--white);
  display:block;margin-bottom:7px;
  text-shadow:2px 2px 0 var(--black);
}
.btn-sub {
  font-size:8px;          /* ← increased */
  display:block;
  text-shadow:1px 1px 0 var(--black);
}
.link-btn     .btn-sub{color:var(--sky);}
.link-btn.shop .btn-sub{color:var(--orange);}

.btn-arrow {
  font-size:12px;color:var(--orange);
  flex-shrink:0;opacity:0;
  text-shadow:1px 1px 0 var(--black);
}
.link-btn:hover .btn-arrow {
  opacity:1;
  animation:arrow-blink .5s steps(1) infinite;
}
@keyframes arrow-blink{50%{opacity:0}}

/* ---- PIXEL WATER WAVE ---- */
.px-water{
  display:flex;justify-content:center;
  gap:3px;margin-top:20px;
}
.water-px{
  width:8px;height:8px;
  animation:wave-bob .7s steps(2) infinite alternate;
}
.water-px:nth-child(odd) {background:var(--sky); animation-delay:0s;}
.water-px:nth-child(even){background:var(--blue);animation-delay:.35s;}
@keyframes wave-bob{
  from{transform:translateY(0);}
  to  {transform:translateY(-6px);}
}

/* ---- FOOTER ---- */
.footer {
  margin-top:22px;
  font-size:6px;          /* ← increased */
  color:rgba(88,189,238,.45);
  text-align:center;
  line-height:2.6;
  text-shadow:1px 1px 0 var(--black);
}

@media(max-width:400px){
  .mascot-wrap img{width:125px;}
  .btn-label{font-size:9px;}
  .card{padding:22px 14px 22px;}
}
@media(prefers-reduced-motion:reduce){
  .mascot-wrap,.reed,.lilypad,.water-px,.px-corner{animation:none;}
}
</style>
</head>

<script>
// ===== CANVAS SWAMP WATER =====
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Ripples
const ripples = [];
function spawnRipple(){
  ripples.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: 2,
    maxR: 55 + Math.random() * 70,
    alpha: 0.45,
    speed: 0.45 + Math.random() * 0.5
  });
}
spawnRipple(); spawnRipple();
setInterval(spawnRipple, 1400);

// Fireflies
const FFs = [];
for(let i = 0; i < 18; i++){
  FFs.push({
    x: Math.random() * 2000,
    y: Math.random() * 1200,
    vx:(Math.random()-.5)*.5,
    vy:(Math.random()-.5)*.4,
    a: Math.random(),
    da:0.008 + Math.random()*0.012,
    sz: 2,
    col: Math.random()>.45 ? '#AAFF44' : '#EEFF88'
  });
}

let t = 0;
function draw(){
  t++;
  const W = canvas.width, H = canvas.height;

  // --- Base swamp gradient ---
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,   '#58BDEE');
  g.addColorStop(0.35,'#1F5FA8');
  g.addColorStop(0.75,'#0E3E75');
  g.addColorStop(1,   '#082B56');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // Pixel tile grid
  ctx.fillStyle = 'rgba(30,90,35,0.07)';
  for(let x=0;x<W;x+=16) ctx.fillRect(x,0,1,H);
  for(let y=0;y<H;y+=16) ctx.fillRect(0,y,W,1);

  // Water shimmer bands (horizontal drifting)
  for(let i=0;i<14;i++){
    const y   = ((t * 0.22 + i * (H/14)) % H);
    const ww  = 30 + Math.sin(t*0.015 + i*0.9)*40;
    const xx  = (Math.sin(t*0.008 + i*0.6)*0.5+0.5) * W;
    ctx.fillStyle = `rgba(50,130,60,0.065)`;
    ctx.fillRect(Math.floor(xx - ww/2), Math.floor(y), Math.floor(ww), 2);
  }

  // Ripples (pixel-snapped ellipses)
  for(let i = ripples.length-1; i >= 0; i--){
    const rp = ripples[i];
    rp.r    += rp.speed;
    rp.alpha = Math.max(0, rp.alpha - 0.003);
    const ry = rp.r * 0.38;

    ctx.strokeStyle = `rgba(70,175,85,${rp.alpha})`;
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.ellipse(Math.round(rp.x), Math.round(rp.y), rp.r, ry, 0, 0, Math.PI*2);
    ctx.stroke();

    if(rp.r > 18){
      ctx.strokeStyle = `rgba(70,175,85,${rp.alpha*.5})`;
      ctx.beginPath();
      ctx.ellipse(Math.round(rp.x), Math.round(rp.y), rp.r*.55, ry*.55, 0, 0, Math.PI*2);
      ctx.stroke();
    }
    if(rp.r >= rp.maxR) ripples.splice(i,1);
  }

  // Fireflies
  FFs.forEach(ff => {
    ff.x += ff.vx; ff.y += ff.vy;
    ff.a += ff.da;
    if(ff.a>1||ff.a<0) ff.da*=-1;
    if(ff.x<0) ff.x=W; if(ff.x>W) ff.x=0;
    if(ff.y<0) ff.y=H; if(ff.y>H) ff.y=0;
    const px = Math.round(ff.x/2)*2, py = Math.round(ff.y/2)*2;
    // glow halo
    ctx.fillStyle = ff.col + '22';
    ctx.fillRect(px-4, py-4, 10, 10);
    // core pixel
    ctx.globalAlpha = ff.a * 0.9;
    ctx.fillStyle = ff.col;
    ctx.fillRect(px, py, ff.sz, ff.sz);
    ctx.globalAlpha = 1;
  });

  // Subtle mist at bottom
  const mist = ctx.createLinearGradient(0, H*0.75, 0, H);
  mist.addColorStop(0, 'rgba(30,80,35,0)');
  mist.addColorStop(1, 'rgba(10,40,12,0.35)');
  ctx.fillStyle = mist;
  ctx.fillRect(0, H*0.75, W, H*0.25);

  requestAnimationFrame(draw);
}
draw();

// ===== LILY PADS =====
const layer = document.getElementById('swamp-layer');
const padData = [
  {x:4,  y:8,  s:60, r:20,   dur:6.5, flower:true},
  {x:82, y:12, s:44, r:140,  dur:7.8, flower:false},
  {x:15, y:55, s:52, r:280,  dur:5.9, flower:true},
  {x:88, y:60, s:68, r:60,   dur:8.2, flower:false},
  {x:6,  y:80, s:40, r:330,  dur:6.1, flower:true},
  {x:75, y:82, s:56, r:200,  dur:7.4, flower:false},
  {x:45, y:5,  s:36, r:90,   dur:9.0, flower:false},
  {x:55, y:88, s:48, r:250,  dur:6.7, flower:true},
  {x:30, y:30, s:38, r:170,  dur:7.2, flower:false},
  {x:70, y:40, s:42, r:310,  dur:8.5, flower:true},
  {x:20, y:70, s:30, r:50,   dur:5.5, flower:false},
  {x:92, y:30, s:35, r:120,  dur:9.3, flower:true},
  {x:50, y:65, s:44, r:220,  dur:6.0, flower:false},
  {x:3,  y:42, s:50, r:340,  dur:7.8, flower:true},
  {x:78, y:72, s:34, r:80,   dur:8.1, flower:false},
];
padData.forEach(p => {
  const d  = document.createElement('div');
  d.className = 'lilypad' + (p.flower ? ' flower':'');
  d.style.cssText =
    `left:${p.x}%;top:${p.y}%;` +
    `width:${p.s}px;height:${p.s}px;` +
    `--rot:${p.r}deg;--dur:${p.dur}s;` +
    `transform:rotate(${p.r}deg);` +
    `animation-delay:${(Math.random()*-12).toFixed(1)}s`;
  layer.appendChild(d);
});

// ===== REEDS =====
const reedPositions = [
  {x:2,h:120,sway:'6s'},{x:8,h:90,sway:'5.5s'},{x:12,h:140,sway:'7s'},
  {x:87,h:110,sway:'5s'},{x:92,h:85,sway:'6.5s'},{x:96,h:130,sway:'4.8s'},
  {x:22,h:95,sway:'6.2s'},{x:76,h:105,sway:'5.7s'},
  {x:35,h:75,sway:'7.5s'},{x:65,h:88,sway:'6.8s'},
  {x:50,h:60,sway:'5.2s'},{x:18,h:115,sway:'6.9s'},
];
reedPositions.forEach(r => {
  const d = document.createElement('div');
  d.className = 'reed';
  d.style.cssText =
    `left:${r.x}%;height:${r.h}px;--sway:${r.sway};` +
    `animation-delay:${(Math.random()*-8).toFixed(1)}s;` +
    `width:${2+Math.random()*3}px`;
  layer.appendChild(d);
});

// ===== PIXEL WATER BLOCKS =====
const pxw = document.getElementById('pxwater');
for(let i=0;i<22;i++){
  const b = document.createElement('div');
  b.className = 'water-px';
  b.style.animationDelay = (i*0.07)+'s';
  pxw.appendChild(b);
}
</script>
